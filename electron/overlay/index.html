<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Eva</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { background: transparent !important; }

    body {
      overflow: hidden;
      font-family: -apple-system, "SF Pro Text", "SF Pro Display", sans-serif;
      -webkit-app-region: drag;
      height: 100vh;
    }

    /* No separate ambient shell — the .pill itself is always visible and
       serves both ambient (window short) and open (window tall) modes. */

    /* ── Pill — always visible. Ambient mode shows just the rounded-bottom
       strip below the notch (window is short); on hover the window grows
       and the input row is revealed. No scaleY animation — window-resize
       animation in main process drives the drop/collapse feel. ── */
    .pill {
      width: 100%;
      background: #000000;
      -webkit-backdrop-filter: none;
      backdrop-filter: none;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .pill.drop .input-row { animation: fadeIn 0.1s ease 0.12s both; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Input row — animates between default 68px and expanded 99px ── */
    .input-row {
      flex: 0 0 68px;
      display: flex;
      align-items: center;
      padding: 20px 14px 0 14px;
      gap: 8px;
      transition: flex-basis 0.22s cubic-bezier(0.22, 1, 0.36, 1),
                  opacity 0.15s ease;
    }

    /* Hide input content in resting/ambient mode so the pill looks like a
       clean notch extension. Dot is outside .input-row so it stays visible. */
    body:not(.overlay-open) .input-row {
      opacity: 0;
      pointer-events: none;
    }

    .pill.expanded .input-row {
      flex: 0 0 68px;
    }

    .pill.expanded .browse-btn { color: rgba(255,255,255,0.22); }
    .pill.expanded .browse-btn:hover { color: rgba(255,255,255,0.55); }

    input {
      flex: 1;
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.9);
      font-family: -apple-system, "SF Pro Text", "SF Pro Display", sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.02em;
      font-feature-settings: "cv02","cv03","cv04","cv11";
      outline: none;
      -webkit-app-region: no-drag;
      caret-color: #dc2626;
      transition: font-weight 0.1s ease;
    }

    input.has-text { font-weight: 700; }
    input::placeholder { color: rgba(255,255,255,0.22); font-weight: 700; }

    /* ── Image chip — appears when image is attached ── */
    .image-chip {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border-radius: 6px;
      position: relative;
      background-size: cover;
      background-position: center;
      background-color: rgba(255,255,255,0.05);
      -webkit-app-region: no-drag;
      display: none;
    }

    .image-chip.visible { display: block; }

    .image-chip .clear {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #dc2626;
      color: white;
      font-size: 9px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      line-height: 1;
    }

    /* ── Drag overlay ── */
    .pill.drag-over {
      box-shadow: inset 0 0 0 2px rgba(220, 38, 38, 0.55);
    }

    /* ── Browse button ── */
    .browse-btn {
      width: 22px;
      height: 22px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.0);
      cursor: pointer;
      -webkit-app-region: no-drag;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      flex-shrink: 0;
      position: relative;
      margin-bottom: 2px;
      transition: color 0.2s ease;
    }

    .browse-btn.has-tasks { color: rgba(255,255,255,0.2); }
    .browse-btn.has-tasks:hover { color: rgba(255,255,255,0.45); }
    .browse-btn.active { color: rgba(255,255,255,0.6); }

    .browse-badge {
      position: absolute;
      top: -3px;
      right: -3px;
      background: #dc2626;
      border-radius: 99px;
      font-size: 7px;
      font-weight: 700;
      color: white;
      min-width: 12px;
      height: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 2px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .browse-badge.visible { opacity: 1; }
    .browse-badge.pulse   { animation: badgePulse 1.4s ease-in-out infinite; }

    @keyframes badgePulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }

    /* ── Task panel — slides in below input row ── */
    .task-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .task-separator {
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin: 0 10px;
      flex-shrink: 0;
    }

    /* ── Tabs (Tasks / Thoughts) — Nook-style ── */
    .tabs {
      display: flex;
      gap: 4px;
      padding: 8px 10px 4px;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }

    .tab {
      flex: 0 0 auto;
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: -0.01em;
      border-radius: 99px;
      color: rgba(255,255,255,0.45);
      background: transparent;
      border: none;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
      -webkit-app-region: no-drag;
    }

    .tab:hover { color: rgba(255,255,255,0.7); }

    .tab.active {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.85);
      font-weight: 600;
    }

    .task-list {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 4px 6px 8px;
    }

    .task-list::-webkit-scrollbar { width: 3px; }
    .task-list::-webkit-scrollbar-track { background: transparent; }
    .task-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 99px; }
    .task-list::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.22); }

    .task-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      cursor: pointer;
      border-radius: 6px;
      -webkit-app-region: no-drag;
      transition: background 0.1s;
    }

    .task-row:hover { background: rgba(255,255,255,0.06); }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.pending        { background: rgba(255,255,255,0.2); }
    .status-dot.running        { background: rgba(255,255,255,0.5); animation: dotPulse 1s ease-in-out infinite; }
    .status-dot.done           { background: #22c55e; }
    .status-dot.needs_approval { background: #eab308; }
    .status-dot.failed         { background: #ef4444; }
    .status-dot.captured       { background: rgba(255,255,255,0.2); }

    /* ── Thought row — no dot, slight left indent ── */
    .thought-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px 7px 12px;
      cursor: pointer;
      border-radius: 6px;
      -webkit-app-region: no-drag;
      transition: background 0.1s;
      border-left: 1px dotted rgba(255,255,255,0.16);
      margin-left: 2px;
    }

    .thought-row:hover { background: rgba(255,255,255,0.06); }

    .thought-footer {
      padding: 8px 10px;
      font-size: 10px;
      color: rgba(255,255,255,0.28);
      cursor: pointer;
      letter-spacing: 0.02em;
      -webkit-app-region: no-drag;
      text-align: center;
    }

    .thought-footer:hover { color: rgba(255,255,255,0.55); }

    .panel-empty {
      padding: 18px 10px;
      font-size: 11px;
      color: rgba(255,255,255,0.22);
      text-align: center;
      letter-spacing: -0.01em;
    }

    @keyframes dotPulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.2; }
    }

    .task-name {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.82);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -0.005em;
    }

    .task-time {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      flex-shrink: 0;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
    }

    /* ── Notch confirmation — shows after collapse ── */
    .notch-confirm {
      position: fixed;
      inset: 0;
      background: #000000;
      border-radius: 14px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 14px;
      gap: 6px;
      opacity: 0;
      pointer-events: none;
    }

    .notch-confirm.show { animation: confirmPop 1.6s ease forwards; }

    @keyframes confirmPop {
      0%   { opacity: 0; }
      15%  { opacity: 1; }
      70%  { opacity: 1; }
      100% { opacity: 0; }
    }

    .notch-confirm .tick {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #16a34a;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .notch-confirm .tick svg { width: 8px; height: 8px; }

    .notch-confirm .text {
      font-size: 15px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      letter-spacing: -0.01em;
    }

    /* ── Text measurement ── */
    #inputMeasure {
      position: absolute;
      visibility: hidden;
      white-space: pre;
      font-family: -apple-system, "SF Pro Text", "SF Pro Display", sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.02em;
      pointer-events: none;
    }

    /* ── Confetti ── */
    #confetti {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* ── Ambient status dot — fixed near notch.
       In ambient mode: centered just below notch cutout.
       In open mode: top-left corner of pill (notch only covers center, so
       corners are visible without overlapping the input row content). ── */
    /* Status dot — same position in ambient and open modes (top-right of
       the pill, just past notch edge). x is outside notch hardware, so it's
       always visible regardless of window height. */
    .ambient-dot {
      position: fixed;
      top: 7px;
      right: 18px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      cursor: pointer;
      -webkit-app-region: no-drag;
      z-index: 9999;
      background: transparent;
      transition: background 0.15s ease;
    }

    .ambient-dot[hidden] { display: none; }

    .ambient-dot[data-status="running"] {
      background: #eab308;
      animation: ambientPulse 1s ease-in-out infinite;
    }
    .ambient-dot[data-status="needs_approval"],
    .ambient-dot[data-status="needs_otp"] {
      background: #f97316;
      animation: ambientPulse 1.4s ease-in-out infinite;
    }
    .ambient-dot[data-status="done"]    { background: #22c55e; }
    .ambient-dot[data-status="failed"]  { background: #ef4444; }
    .ambient-dot[data-status="pending"],
    .ambient-dot[data-status="captured"] {
      background: rgba(255,255,255,0.55);
      animation: ambientPulseFaint 2s ease-in-out infinite;
    }

    @keyframes ambientPulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.25; }
    }
    @keyframes ambientPulseFaint {
      0%, 100% { opacity: 0.95; }
      50%      { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <span id="inputMeasure" aria-hidden="true"></span>

  <!-- input panel -->
  <div class="pill" id="pill">
    <div class="input-row">
      <div class="image-chip" id="imageChip">
        <div class="clear" id="imageChipClear">×</div>
      </div>
      <input type="text" id="taskInput" autocomplete="off" spellcheck="false">
      <button class="browse-btn" id="browseBtn" tabindex="-1">
        <svg width="11" height="9" viewBox="0 0 11 9" fill="currentColor">
          <rect y="0"    width="11" height="1.5" rx="0.75"/>
          <rect y="3.75" width="8"  height="1.5" rx="0.75"/>
          <rect y="7.5"  width="5"  height="1.5" rx="0.75"/>
        </svg>
        <span class="browse-badge" id="browseBadge"></span>
      </button>
    </div>

    <div class="task-panel" id="taskPanel">
      <div class="task-separator"></div>
      <div class="tabs" id="tabs">
        <button class="tab active" id="tabTasks" data-tab="tasks" tabindex="-1">Tasks</button>
        <button class="tab" id="tabThoughts" data-tab="thoughts" tabindex="-1">Thoughts</button>
      </div>
      <div class="task-list" id="taskList"></div>
    </div>

    <canvas id="confetti"></canvas>
  </div>

  <!-- ambient status dot — most-recent-task indicator, sits just below notch -->
  <div id="ambientDot" class="ambient-dot" hidden title="Open most recent task"></div>

  <!-- notch confirmation shown after collapse -->
  <div class="notch-confirm" id="notchConfirm">
    <div class="tick">
      <svg viewBox="0 0 7 7" fill="none">
        <path d="M1 3.5L3 5.5L6 2" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="text">Captured</span>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
