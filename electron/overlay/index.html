<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Eva</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      overflow: hidden;
      background: transparent;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      -webkit-app-region: drag;
      height: 100vh;
    }

    /* ── Input panel — drops from notch ── */
    .pill {
      width: 100%;
      background: #000000;
      -webkit-backdrop-filter: none;
      backdrop-filter: none;
      border-radius: 0 0 14px 14px;
      display: flex;
      align-items: flex-end;
      padding: 0 14px 14px 14px;
      height: 100vh;
      position: relative;
      transform-origin: top center;
      transform: scaleY(0);
    }

    .pill.drop {
      animation: dropDown 0.2s linear forwards;
    }

    .pill.collapse {
      animation: collapseUp 0.07s cubic-bezier(0.4, 0, 1, 1) forwards;
    }

    @keyframes dropDown {
      0%   { transform: scaleY(0);    }
      55%  { transform: scaleY(1.07); }
      75%  { transform: scaleY(0.97); }
      100% { transform: scaleY(1);    }
    }

    @keyframes collapseUp {
      0%   { transform: scaleY(1); }
      100% { transform: scaleY(0); }
    }

    .pill.drop input {
      animation: fadeIn 0.1s ease 0.12s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    input {
      flex: 1;
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.9);
      font-family: "Inter", -apple-system, sans-serif;
      font-size: 15px;
      font-weight: 400;
      letter-spacing: -0.02em;
      font-feature-settings: "cv02","cv03","cv04","cv11";
      outline: none;
      -webkit-app-region: no-drag;
      caret-color: #dc2626;
      transition: font-weight 0.1s ease;
    }

    input.has-text { font-weight: 500; }
    input::placeholder { color: rgba(255,255,255,0.22); font-weight: 300; }

    .esc-hint {
      font-size: 9px;
      font-weight: 500;
      color: rgba(255,255,255,0.16);
      letter-spacing: 0.06em;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }

    /* ── Notch confirmation — shows after collapse ── */
    .notch-confirm {
      position: fixed;
      inset: 0;
      background: #000000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 14px;
      gap: 6px;
      opacity: 0;
      pointer-events: none;
    }

    .notch-confirm.show {
      animation: confirmPop 1.6s ease forwards;
    }

    @keyframes confirmPop {
      0%   { opacity: 0; }
      15%  { opacity: 1; }
      70%  { opacity: 1; }
      100% { opacity: 0; }
    }

    .notch-confirm .tick {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #dc2626;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .notch-confirm .tick svg { width: 7px; height: 7px; }

    .notch-confirm .text {
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.7);
      letter-spacing: -0.01em;
    }

    /* ── Confetti ── */
    #confetti {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <!-- input panel -->
  <div class="pill" id="pill">
    <input type="text" id="taskInput" autocomplete="off" spellcheck="false">
    <canvas id="confetti"></canvas>
  </div>

  <!-- notch confirmation shown after collapse -->
  <div class="notch-confirm" id="notchConfirm">
    <div class="tick">
      <svg viewBox="0 0 7 7" fill="none">
        <path d="M1 3.5L3 5.5L6 2" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="text">captured</span>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
