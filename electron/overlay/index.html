<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Eva</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      overflow: hidden;
      background: transparent;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-app-region: drag;
      height: 100vh;
    }

    .pill {
      width: 100%;
      background: #000000;
      border-radius: 0 0 14px 14px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      height: 100vh;
      position: relative;
      transform-origin: top center;
      transform: scaleY(0);
    }

    .pill.drop {
      animation: dropFromNotch 0.32s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes dropFromNotch {
      0%   { transform: scaleY(0); }
      100% { transform: scaleY(1); }
    }

    /* input fades in slightly after drop starts */
    .pill.drop input,
    .pill.drop .esc-hint {
      animation: fadeInContent 0.2s ease 0.18s both;
    }

    @keyframes fadeInContent {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    input {
      flex: 1;
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.9);
      font-family: "Inter", -apple-system, sans-serif;
      font-size: 15px;
      font-weight: 400;
      letter-spacing: -0.02em;
      font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      outline: none;
      -webkit-app-region: no-drag;
      caret-color: #e11d48;
      transition: font-weight 0.1s ease;
    }

    input.has-text { font-weight: 500; }

    input::placeholder {
      color: rgba(255, 255, 255, 0.22);
      font-weight: 300;
    }

    .esc-hint {
      font-size: 9px;
      font-weight: 500;
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.06em;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }

    /* Sent pill */
    .sent-pill {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 0 0 14px 14px;
      background: #000;
      opacity: 0;
      pointer-events: none;
    }

    .sent-pill.visible {
      animation: pillIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .sent-pill.fading {
      animation: pillOut 0.25s ease-in forwards;
    }

    @keyframes pillIn {
      0% { opacity: 0; transform: translateY(4px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes pillOut {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    .sent-pill .check {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #e11d48;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .sent-pill .check svg { width: 10px; height: 10px; }

    .sent-pill .label {
      color: rgba(255,255,255,0.8);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    /* Confetti */
    #confetti {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="pill">
    <input type="text" id="taskInput" autocomplete="off" spellcheck="false">
    <span class="esc-hint">esc</span>
    <canvas id="confetti"></canvas>
    <div class="sent-pill" id="sentPill">
      <div class="check">
        <svg viewBox="0 0 10 10" fill="none">
          <path d="M1.5 5L4 7.5L8.5 2.5" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="label">On it.</span>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
