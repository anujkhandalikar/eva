<!DOCTYPE html>
<html>
<body style="background: red;">
<div style="
  width: 300px; height: 100px; background: black;
  border-radius: 0 0 14px 14px;
  -webkit-mask-image: 
    radial-gradient(circle at 0 0, transparent 14px, black 14.5px),
    radial-gradient(circle at 100% 0, transparent 14px, black 14.5px);
  -webkit-mask-size: 51% 100%;
  -webkit-mask-repeat: no-repeat;
  -webkit-mask-position: left, right;
"></div>
</body>
</html>
